name: Generate Baseline Profiles
on:
  workflow_dispatch:
    inputs:
      kmp_flavor:
        description: 'KMP Flavor (dev or prod)'
        required: true
        default: 'prod'
        type: choice
        options:
          - dev
          - prod
  push:

jobs:
  generate_profiles:
    name: Generate Baseline Profiles
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: Generate baseline profiles
        run: ./gradlew generateReleaseBaselineProfile -P buildkonfig.flavor=${{ github.event.inputs.kmp_flavor }}

      - name: Upload baseline profiles artifact
        uses: actions/upload-artifact@v3
        with:
          name: baseline-profiles
          path: '**/build/outputs/baseline-prof/*.txt'